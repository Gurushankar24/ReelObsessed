<header class="liked-header">
  <div class="header-container">
    <button class="back-link" (click)="OnBack()">
      <span class="material-icons">arrow_back</span>
      Back to Search
    </button>
    <span class="logo">ReelObsessed</span>
  </div>
</header>

<main class="liked-content">
  <h2 class="page-title">Liked Movies</h2>
  <div class="movie-grid">
    @for (existingmovies of existingMovies(); track $index) {
      <div class="movie-card">
        <div class="poster-container">
          <img
            [src]="existingmovies.Poster !== 'N/A' ? existingmovies.Poster : 'assets/placeholder.png'"
            [alt]="existingmovies.Title"
          />
          <button class="add-btn">
            <span class="material-icons">add</span>
          </button>
        </div>
        <div class="movie-info">
          <h4>{{ existingmovies.Title }}</h4>
          <p>{{ existingmovies.Year }} • {{ existingmovies.Type }}</p>
        </div>
      </div>
    }
  </div>
</main>
